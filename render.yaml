services:
  - type: web
    name: uniplan-api
    env: python
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: UNIPLAN_CORS_ORIGINS
        value: https://your-uniplan-frontend.vercel.app
      - key: UNIPLAN_DB_PATH
        value: /opt/render/project/src/data/course_inventory.db
